name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'   # 从 3.12 改成 3.11

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install ALL system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf automake libtool pkg-config \
          zip unzip zlib1g-dev libncurses5-dev \
          g++ gcc gfortran libopenblas-dev liblapack-dev \
          libffi-dev libssl-dev libbz2-dev libreadline-dev \
          libsqlite3-dev liblzma-dev tk-dev

    - name: Install buildozer and cython
      run: |
        python3 -m pip install --upgrade pip setuptools
        pip3 install buildozer cython

    - name: Verify Python version
      run: python3 --version

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: audio-anomaly-apk
        path: bin/*.apk
