name: Build Android APK (Docker Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build APK in Buildozer Docker
      uses: addnab/docker-run-action@v3
      with:
        image: kivy/buildozer:latest
        options: -v ${{ github.workspace }}:/home/user/hostcwd -w /home/user/hostcwd
        run: |
          # 1. 安装 Python 3.12（deadsnakes PPA）
          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update
          apt-get install -y python3.12 python3.12-venv python3.12-dev

          # 2. 用 Python 3.12 创建独立虚拟环境
          python3.12 -m venv /opt/py312
          source /opt/py312/bin/activate

          # 3. 在新环境中安装 buildozer
          pip install --upgrade pip
          pip install buildozer cython

          # 4. 确认版本
          python --version

          # 5. 执行构建
          cd /home/user/hostcwd
          yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: audio-anomaly-apk
        path: bin/*.apk
